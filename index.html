<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login/Register Animated</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- Login Form -->
      <div class="form__box login">
        <form action="#" id="type">
          <h1>Login</h1>
          <div class="input__box">
            <input type="text" placeholder="Username" required />
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input__box">
            <input type="password" placeholder="Password" />
            <i class="fa-solid fa-lock"></i>
          </div>
          <div class="forgot__link">
            <a href="#">Forgot your Password?</a>
          </div>
          <button type="submit" class="btn">Login</button>
          <p>or login with social media:</p>
          <div class="social__icons">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
          </div>
        </form>
      </div>
      <!-- Register Form -->
      <div class="form__box register">
        <form action="#">
          <h1>Registration</h1>
          <div class="input__box">
            <input type="text" placeholder="Username" required />
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input__box">
            <input type="email" placeholder="Email" />
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="input__box">
            <input type="password" placeholder="Password" />
            <i class="fa-solid fa-lock"></i>
          </div>
          <button type="submit" class="btn">Register</button>
          <p>or register with social media:</p>
          <div class="social__icons">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
          </div>
        </form>
      </div>
      <!-- Toggle Box -->
      <div class="toggle__box">
        <!-- Left Side, Register -->
        <div class="toggle__panel toggle__left">
          <h1>Hello and Welcome!</h1>
          <p>Don't have an account?</p>
          <button class="btn register__btn">Register</button>
        </div>
        <!-- Right Side, Login -->
        <div class="toggle__panel toggle__right">
          <h1>Welcome Back!</h1>
          <p>Already have an account?</p>
          <button class="btn login__btn">Login</button>
        </div>
      </div>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
